<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YB CONMANNY - ACCESO PRIVADO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Efecto matrix de fondo (solo estético) */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 0, 0, 0.5) 1px,
                transparent 2px
            );
            pointer-events: none;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: white;
            font-size: 2.5em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 10px;
        }

        .login-header .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
            position: relative;
        }

        .login-header .subtitle::before,
        .login-header .subtitle::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .login-header .subtitle::before {
            left: -40px;
        }

        .login-header .subtitle::after {
            right: -40px;
        }

        /* CAMPO DE CONTRASEÑA - ÚNICO CAMPO */
        .password-field {
            margin-bottom: 25px;
        }

        .password-field label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-input-wrapper input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 1.1em;
            color: white;
            transition: all 0.3s;
            letter-spacing: 3px;
        }

        .password-input-wrapper input:focus {
            outline: none;
            border-color: #00ff00;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .password-input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: normal;
        }

        /* LA CONTRASEÑA YA NO SE MUESTRA - SOLO TÚ LA SABES */
        /* El cuadro de contraseña visible ha sido ELIMINADO */

        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: black;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            font-weight: 900;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .login-button:hover::before {
            left: 100%;
        }

        /* MENSAJES MEJORADOS */
        .message {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            text-shadow: 0 0 5px #ff4444;
        }

        /* PANEL OCULTO QUE SE MUESTRA AL ACCEDER */
        .hidden-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 1px solid #00ff00;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .hidden-panel h3 {
            color: #00ff00;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3em;
        }

        .hidden-panel .option {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .hidden-panel .option:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #00ff00;
            transform: translateX(5px);
        }

        .hidden-panel .option span {
            color: #00ff00;
            margin-right: 10px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }

        .register-link a {
            color: #00ff00;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Decoración cyberpunk */
        .glitch {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 0, 0.1);
            font-size: 10vw;
            font-weight: 900;
            transform: rotate(90deg);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="glitch">YB CONMANNY</div>
    
    <div class="login-container">
        <div class="login-header">
            <h1>⚡ YB ⚡</h1>
            <div class="subtitle">ACCESO RESTRINGIDO</div>
        </div>

        <!-- ÚNICO CAMPO: CONTRASEÑA -->
        <div class="password-field">
            <label>🔐 CLAVE DE ACCESO</label>
            <div class="password-input-wrapper">
                <input type="password" id="password" placeholder="••••••••" autofocus>
            </div>
        </div>

        <!-- MENSAJE DE RESPUESTA -->
        <div class="message" id="message"></div>

        <!-- PANEL OCULTO (se muestra solo con clave correcta) -->
        <div class="hidden-panel" id="hiddenPanel">
            <h3>🔓 PANEL DE CONTROL</h3>
            <div class="option" onclick="window.open('YB_CONMANNY.py', '_blank')">
                <span>📁</span> ABRIR TOOLS PRINCIPAL
            </div>
            <div class="option" onclick="alert('SISTEMA: Acceso concedido a YB CONMANNY')">
                <span>💻</span> TERMINAL DE COMANDOS
            </div>
            <div class="option" onclick="window.location.href='https://www.google.com'">
                <span>🌐</span> MODO NAVEGACIÓN
            </div>
            <div class="option" onclick="document.body.style.background='linear-gradient(135deg, #000000 0%, #00ff00 100%)'">
                <span>🎨</span> ACTIVAR MODO VISUAL
            </div>
        </div>

        <!-- BOTÓN DE INICIO -->
        <button class="login-button" onclick="checkPassword()">
            INGRESAR
        </button>

        <div class="register-link">
            [ SOLO PERSONAL AUTORIZADO ]
        </div>
    </div>

    <script>
        // CONTRASEÑA CORRECTA - SOLO TÚ LA SABES
        const CORRECT_PASSWORD = "Y3zzy_171810";
        let accessGranted = false;

        function checkPassword() {
            const passwordInput = document.getElementById('password');
            const messageDiv = document.getElementById('message');
            const hiddenPanel = document.getElementById('hiddenPanel');
            const enteredPassword = passwordInput.value;

            if (enteredPassword === CORRECT_PASSWORD) {
                // CONTRASEÑA CORRECTA - ACCESO CONCEDIDO
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = '✅ ACCESO CONCEDIDO - BIENVENIDO YB CONMANNY';
                
                // OCULTAR el mensaje después de 2 segundos
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 2000);
                
                // MOSTRAR el panel oculto
                hiddenPanel.style.display = 'block';
                
                // EFECTOS VISUALES
                document.body.style.background = 'linear-gradient(135deg, #0f0f0f 0%, #004400 100%)';
                passwordInput.style.borderColor = '#00ff00';
                
                // SONIDO MENTAL (simulado)
                console.log('%c🔓 SISTEMA DESBLOQUEADO', 'color: #00ff00; font-size: 20px;');
                
                accessGranted = true;
                
            } else {
                // CONTRASEÑA INCORRECTA
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = '❌ CLAVE INCORRECTA - ACCESO DENEGADO';
                
                // OCULTAR panel si estaba visible
                hiddenPanel.style.display = 'none';
                
                // EFECTO DE ERROR
                passwordInput.style.borderColor = '#ff4444';
                passwordInput.style.boxShadow = '0 0 20px #ff4444';
                
                setTimeout(() => {
                    passwordInput.style.borderColor = 'rgba(255,255,255,0.1)';
                    passwordInput.style.boxShadow = 'none';
                }, 1000);
                
                // LIMPIAR mensaje después de 2 segundos
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 2000);
                
                accessGranted = false;
            }
            
            // LIMPIAR campo de contraseña por seguridad
            passwordInput.value = '';
        }

        // ENTER para enviar
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // INTENTOS DE SEGURIDAD
        let attempts = 0;
        const originalCheck = checkPassword;
        window.checkPassword = function() {
            attempts++;
            if (attempts > 5) {
                alert('⚠️ DEMASIADOS INTENTOS - ESPERA 30 SEGUNDOS');
                document.getElementById('password').disabled = true;
                document.querySelector('.login-button').disabled = true;
                
                setTimeout(() => {
                    document.getElementById('password').disabled = false;
                    document.querySelector('.login-button').disabled = false;
                    attempts = 0;
                }, 30000);
            }
            originalCheck();
        };

        // MENSAJE INICIAL
        console.log('%c🔐 SISTEMA BLOQUEADO - INGRESA LA CLAVE', 'color: #ff4444; font-size: 16px;');
    </script>
</body>
</html>
