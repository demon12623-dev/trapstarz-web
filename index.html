<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YB CHAT PRIVADO - SEGURO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0a0f);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Fondo animado cyberpunk */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent 0px,
                transparent 20px,
                rgba(0, 255, 255, 0.02) 20px,
                rgba(255, 0, 255, 0.02) 40px
            );
            animation: moveBackground 60s linear infinite;
            opacity: 0.5;
        }

        @keyframes moveBackground {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(5deg); }
        }

        /* Partículas flotantes */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: cyan;
            border-radius: 50%;
            box-shadow: 0 0 10px cyan;
            animation: float 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* PANTALLA DE LOGIN */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(15px);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #loginScreen.hidden {
            transform: scale(0) rotate(180deg);
            opacity: 0;
            pointer-events: none;
        }

        .login-container {
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 40px;
            padding: 50px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3),
                        0 0 100px rgba(255, 0, 255, 0.2);
            position: relative;
            overflow: hidden;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 50px rgba(0, 255, 255, 0.3), 0 0 100px rgba(255, 0, 255, 0.2); }
            50% { box-shadow: 0 0 80px rgba(0, 255, 255, 0.5), 0 0 150px rgba(255, 0, 255, 0.4); }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                cyan 10deg,
                magenta 20deg,
                transparent 30deg,
                transparent 360deg
            );
            animation: rotate 4s linear infinite;
            opacity: 0.1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-container h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(45deg, cyan, magenta, cyan);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            letter-spacing: 3px;
        }

        .login-container .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            font-size: 1.1em;
            position: relative;
            z-index: 1;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .input-group label {
            display: block;
            color: cyan;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9em;
            text-shadow: 0 0 10px cyan;
        }

        .input-group input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
            border-color: rgba(0, 255, 255, 0.3);
        }

        .input-group input:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.7);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            color: black;
            font-weight: 900;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 20px;
        }

        .login-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 40px cyan, 0 0 80px magenta;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 20px;
            display: none;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px #ff4444;
        }

        /* CHAT PRINCIPAL */
        #chatScreen {
            width: 100%;
            height: 100vh;
            display: none;
            position: relative;
            z-index: 1;
        }

        #chatScreen.visible {
            display: block;
        }

        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(10px);
        }

        /* SIDEBAR DE USUARIOS */
        .users-sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.6);
            border-right: 2px solid rgba(cyan, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 2px solid rgba(cyan, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .sidebar-header h3 {
            color: cyan;
            font-size: 1.5em;
            text-shadow: 0 0 10px cyan;
            margin-bottom: 5px;
        }

        .online-count {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-count span {
            color: #00ff00;
            font-weight: bold;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .user-item:hover {
            background: rgba(cyan, 0.1);
            border-color: cyan;
            transform: translateX(5px);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 1.2em;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        /* CHAT PRINCIPAL */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid rgba(magenta, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            color: magenta;
            text-shadow: 0 0 10px magenta;
            font-size: 1.8em;
        }

        .current-user {
            background: linear-gradient(45deg, cyan, magenta);
            padding: 10px 20px;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-small {
            background: none;
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .logout-small:hover {
            background: #ff4444;
            color: black;
        }

        /* ÁREA DE MENSAJES */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 10px;
            animation: messageAppear 0.3s;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.own-message {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(cyan, 0.3);
            border-radius: 25px;
            padding: 15px 20px;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .own-message .message-bubble {
            background: linear-gradient(135deg, rgba(cyan, 0.2), rgba(magenta, 0.2));
            border-color: magenta;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: cyan;
            font-size: 0.9em;
            font-weight: bold;
        }

        .own-message .message-header {
            color: magenta;
        }

        .message-time {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7em;
            margin-left: 10px;
        }

        .message-text {
            color: white;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-media {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            cursor: pointer;
            border: 2px solid rgba(cyan, 0.3);
        }

        .message-media:hover {
            border-color: cyan;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px #ff4444;
        }

        .message-wrapper:hover .delete-btn {
            display: flex;
        }

        .delete-btn:hover {
            background: #ff0000;
            transform: scale(1.1);
        }

        /* ÁREA DE ENVÍO */
        .send-area {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 2px solid rgba(cyan, 0.3);
        }

        .send-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid cyan;
            color: cyan;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .tool-btn:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 20px cyan;
        }

        .tool-btn.file-btn {
            border-color: magenta;
            color: magenta;
        }

        .tool-btn.file-btn:hover {
            background: magenta;
            color: black;
            box-shadow: 0 0 20px magenta;
        }

        .send-input-area {
            display: flex;
            gap: 15px;
        }

        .send-input-area input {
            flex: 1;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
        }

        .send-input-area input:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .send-btn {
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            padding: 0 40px;
            color: black;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px cyan;
        }

        /* MODAL DE IMAGEN */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .image-modal.visible {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid cyan;
            border-radius: 20px;
            box-shadow: 0 0 50px cyan;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #ff4444;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        /* SCROLL PERSONALIZADO */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(cyan, magenta);
            border-radius: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .users-sidebar {
                display: none;
            }
            
            .message-bubble {
                max-width: 80%;
            }
            
            .login-container {
                padding: 30px 20px;
            }
            
            .login-container h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE LOGIN -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>YB CHAT</h1>
            <div class="subtitle">⚡ CHAT PRIVADO Y SEGURO ⚡</div>
            
            <div class="input-group">
                <label>👤 TU NOMBRE</label>
                <input type="text" id="username" placeholder="Ej: YB_Guerrero" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔐 CLAVE DE ACCESO</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <button class="login-btn" onclick="login()">ENTRAR AL CHAT</button>
            
            <div class="error-message" id="loginError">❌ Clave incorrecta</div>
        </div>
    </div>

    <!-- CHAT PRINCIPAL -->
    <div id="chatScreen">
        <div class="chat-container">
            <!-- SIDEBAR DE USUARIOS -->
            <div class="users-sidebar">
                <div class="sidebar-header">
                    <h3>YB CHAT</h3>
                    <div class="online-count">
                        <span>●</span> <span id="onlineCount">1</span> conectados
                    </div>
                </div>
                <div class="users-list" id="usersList">
                    <!-- Usuarios aparecerán aquí -->
                </div>
            </div>

            <!-- CHAT PRINCIPAL -->
            <div class="chat-main">
                <div class="chat-header">
                    <h2># CHAT PRIVADO</h2>
                    <div class="current-user" id="currentUserDisplay">
                        <span>👤</span>
                        <span id="currentUserName">Usuario</span>
                        <button class="logout-small" onclick="logout()">✕</button>
                    </div>
                </div>

                <!-- ÁREA DE MENSAJES -->
                <div class="messages-area" id="messagesArea">
                    <!-- Mensajes aparecerán aquí -->
                </div>

                <!-- ÁREA DE ENVÍO -->
                <div class="send-area">
                    <div class="send-tools">
                        <button class="tool-btn" onclick="document.getElementById('imageInput').click()">
                            📷 ENVIAR FOTO
                        </button>
                        <button class="tool-btn file-btn" onclick="document.getElementById('videoInput').click()">
                            🎥 ENVIAR VIDEO
                        </button>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                        <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="sendVideo(this)">
                    </div>
                    
                    <div class="send-input-area">
                        <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA VER IMÁGENES -->
    <div class="image-modal" id="imageModal" onclick="this.classList.remove('visible')">
        <img id="modalImage" src="" alt="">
        <button class="close-modal" onclick="document.getElementById('imageModal').classList.remove('visible')">✕</button>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const CORRECT_PASSWORD = "YBdev_12383";
        let currentUser = {
            name: '',
            id: '',
            color: ''
        };
        
        // BASE DE DATOS LOCAL (en el navegador)
        let messages = JSON.parse(localStorage.getItem('yb_chat_messages')) || [];
        let users = JSON.parse(localStorage.getItem('yb_chat_users')) || [];

        // ============================================
        // LOGIN
        // ============================================
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username) {
                alert('❌ Debes poner un nombre');
                return;
            }
            
            if (password !== CORRECT_PASSWORD) {
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            
            // Crear usuario
            currentUser = {
                name: username,
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                color: '#' + Math.floor(Math.random()*16777215).toString(16),
                online: true
            };
            
            // Guardar en lista de usuarios
            users.push({
                name: currentUser.name,
                id: currentUser.id,
                online: true,
                lastSeen: new Date().toISOString()
            });
            
            localStorage.setItem('yb_chat_users', JSON.stringify(users));
            
            // Mostrar chat
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('visible');
            document.getElementById('currentUserName').textContent = currentUser.name;
            
            // Cargar mensajes existentes
            loadMessages();
            updateUsersList();
            
            // Crear partículas de fondo
            createParticles();
        }

        // ============================================
        // MENSAJES
        // ============================================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const message = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                user: currentUser.name,
                userId: currentUser.id,
                text: text,
                type: 'text',
                time: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString(),
                timestamp: Date.now()
            };
            
            messages.push(message);
            saveMessages();
            displayMessage(message);
            
            input.value = '';
        }

        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    user: currentUser.name,
                    userId: currentUser.id,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    date: new Date().toLocaleDateString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                saveMessages();
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
            input.value = '';
        }

        function sendVideo(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    user: currentUser.name,
                    userId: currentUser.id,
                    type: 'video',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    date: new Date().toLocaleDateString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                saveMessages();
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
            input.value = '';
        }

        function deleteMessage(messageId) {
            const message = messages.find(m => m.id === messageId);
            
            // Solo el que envió el mensaje puede borrarlo
            if (message && message.userId === currentUser.id) {
                messages = messages.filter(m => m.id !== messageId);
                saveMessages();
                loadMessages(); // Recargar todos los mensajes
            } else {
                alert('❌ Solo puedes borrar tus propios mensajes');
            }
        }

        function displayMessage(message) {
            const area = document.getElementById('messagesArea');
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${message.userId === currentUser.id ? 'own-message' : ''}`;
            
            let content = '';
            
            if (message.type === 'text') {
                content = `<div class="message-text">${message.text}</div>`;
            } else if (message.type === 'image') {
                content = `<img src="${message.content}" class="message-media" onclick="showImage('${message.content}')">`;
            } else if (message.type === 'video') {
                content = `<video src="${message.content}" controls class="message-media"></video>`;
            }
            
            wrapper.innerHTML = `
                <div class="message-bubble">
                    <div class="message-header">
                        <span>${message.user}</span>
                        <span class="message-time">${message.time}</span>
                    </div>
                    ${content}
                    ${message.userId === currentUser.id ? 
                        `<button class="delete-btn" onclick="deleteMessage('${message.id}')">✕</button>` : ''}
                </div>
            `;
            
            area.appendChild(wrapper);
            area.scrollTop = area.scrollHeight;
        }

        function loadMessages() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            
            // Mostrar últimos 100 mensajes
            messages.slice(-100).forEach(msg => {
                displayMessage(msg);
            });
        }

        function saveMessages() {
            localStorage.setItem('yb_chat_messages', JSON.stringify(messages));
        }

        // ============================================
        // USUARIOS
        // ============================================
        function updateUsersList() {
            const list = document.getElementById('usersList');
            
            // Eliminar duplicados y usuarios offline antiguos
            const uniqueUsers = [];
            users.forEach(user => {
                if (!uniqueUsers.find(u => u.id === user.id)) {
                    uniqueUsers.push(user);
                }
            });
            
            list.innerHTML = uniqueUsers.map(user => `
                <div class="user-item">
                    <div class="user-avatar" style="background: ${user.color || '#00ff00'}">
                        ${user.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="user-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-status">
                            <span class="status-dot"></span>
                            ${user.online ? 'En línea' : 'Desconectado'}
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('onlineCount').textContent = uniqueUsers.length;
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function showImage(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('visible');
        }

        function logout() {
            // Eliminar usuario actual de la lista
            users = users.filter(u => u.id !== currentUser.id);
            localStorage.setItem('yb_chat_users', JSON.stringify(users));
            
            // Volver al login
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.remove('visible');
            
            // Limpiar campos
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                document.body.appendChild(particle);
            }
        }

        // Cargar mensajes al iniciar
        window.onload = function() {
            // Si hay mensajes guardados, cargarlos
            if (messages.length > 0) {
                console.log(`📝 ${messages.length} mensajes cargados`);
            }
        };
    </script>
</body>
</html>
