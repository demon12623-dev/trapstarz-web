<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YB CHAT - VERSIÓN FINAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 0% 0%, #0f0f1e, #030314);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Fondo épico */
        .quantum-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* PANTALLA DE LOGIN */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(3, 3, 20, 0.98);
            backdrop-filter: blur(20px);
        }

        #loginScreen.hidden {
            display: none;
        }

        .login-crystal {
            width: 500px;
            padding: 50px;
            background: rgba(10, 10, 30, 0.7);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            animation: crystalGlow 3s infinite;
        }

        .login-crystal::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, cyan, magenta, cyan, magenta);
            border-radius: 50px;
            z-index: -1;
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes crystalGlow {
            0%, 100% { box-shadow: 0 0 50px rgba(0, 255, 255, 0.5); }
            50% { box-shadow: 0 0 100px rgba(255, 0, 255, 0.5); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 4em;
            background: linear-gradient(45deg, cyan, magenta);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .input-field {
            margin-bottom: 25px;
        }

        .input-field label {
            display: block;
            color: cyan;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .input-field input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px cyan;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            color: black;
            font-weight: 900;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px cyan;
        }

        /* CHAT PRINCIPAL */
        #chatScreen {
            width: 100%;
            height: 100vh;
            display: none;
        }

        #chatScreen.visible {
            display: block;
        }

        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
        }

        /* SIDEBAR PERFECTA */
        .sidebar {
            width: 350px;
            background: rgba(8, 8, 20, 0.98);
            border-right: 2px solid rgba(cyan, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-profile {
            padding: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid magenta;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: black;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .owner-badge {
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            display: inline-block;
            margin-right: 5px;
        }

        /* SECCIÓN DE RECARGA MANUAL (ÚNICA ACTUALIZACIÓN) */
        .refresh-section {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(cyan, 0.3);
            display: flex;
            gap: 10px;
        }

        .refresh-btn {
            flex: 1;
            background: rgba(cyan, 0.1);
            border: 2px solid cyan;
            color: cyan;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: cyan;
            color: black;
            transform: scale(1.02);
        }

        .refresh-btn.refresh-users {
            border-color: magenta;
            color: magenta;
        }

        .refresh-btn.refresh-users:hover {
            background: magenta;
        }

        /* SALAS PRIVADAS */
        .rooms-section {
            padding: 20px;
            border-bottom: 2px solid rgba(cyan, 0.2);
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .rooms-header h4 {
            color: cyan;
            font-size: 1.1em;
        }

        .create-room-btn {
            background: rgba(cyan, 0.1);
            border: 2px solid cyan;
            color: cyan;
            width: 35px;
            height: 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2em;
        }

        .create-room-btn:hover {
            background: cyan;
            color: black;
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(cyan, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-item:hover {
            background: rgba(cyan, 0.1);
            transform: translateX(5px);
        }

        .room-item.active {
            background: rgba(cyan, 0.15);
            border-color: cyan;
            box-shadow: 0 0 20px cyan;
        }

        .room-icon {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            color: white;
            font-weight: 600;
        }

        .room-count {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
        }

        /* USUARIOS EN LÍNEA - AHORA SE ACUMULAN, NUNCA DESAPARECEN */
        .users-section {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .online-count {
            color: cyan;
            font-weight: bold;
        }

        .users-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(cyan, 0.2);
            border-radius: 15px;
            animation: userAppear 0.3s;
        }

        @keyframes userAppear {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name-display {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 3px;
        }

        .user-name-display span {
            color: white;
            font-weight: 600;
        }

        .user-room-indicator {
            font-size: 0.7em;
            color: cyan;
        }

        .user-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            display: inline-block;
            margin-right: 5px;
        }

        /* CHAT PRINCIPAL */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid magenta;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-room {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .room-icon-large {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: black;
        }

        .room-info-large h2 {
            color: cyan;
            font-size: 1.8em;
        }

        .room-info-large p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }

        .room-actions {
            display: flex;
            gap: 10px;
        }

        .call-selector {
            display: flex;
            gap: 5px;
        }

        .call-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .call-btn.video {
            border-color: cyan;
            color: cyan;
        }

        .call-btn.audio {
            border-color: magenta;
            color: magenta;
        }

        .call-btn:hover {
            transform: scale(1.05);
        }

        .call-btn.video:hover {
            background: cyan;
            color: black;
        }

        .call-btn.audio:hover {
            background: magenta;
            color: black;
        }

        .leave-room-btn {
            background: none;
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .leave-room-btn:hover {
            background: #ff4444;
            color: black;
        }

        /* MENSAJES */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 5px;
            animation: messageSlide 0.2s;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(cyan, 0.3);
            border-radius: 25px;
            padding: 15px 20px;
        }

        .own .message-bubble {
            background: linear-gradient(135deg, rgba(cyan, 0.1), rgba(magenta, 0.1));
            border-color: magenta;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .message-sender {
            color: cyan;
            font-weight: bold;
        }

        .own .message-sender {
            color: magenta;
        }

        .message-time {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7em;
        }

        .message-content {
            color: white;
            word-wrap: break-word;
        }

        .message-media {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        .delete-message {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none;
        }

        .message-wrapper:hover .delete-message {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* TYPING INDICATOR */
        .typing-indicator {
            color: rgba(cyan, 0.6);
            font-size: 0.9em;
            padding: 5px 15px;
            font-style: italic;
            min-height: 30px;
        }

        /* INPUT AREA */
        .input-area {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 2px solid cyan;
        }

        .input-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid cyan;
            color: cyan;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tool-btn.file-btn {
            border-color: magenta;
            color: magenta;
        }

        .tool-btn:hover {
            background: cyan;
            color: black;
        }

        .tool-btn.file-btn:hover {
            background: magenta;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: cyan;
        }

        .send-btn {
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            padding: 0 40px;
            color: black;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* MODAL DE LLAMADA - CON BOTÓN PARA UNIRSE */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .call-modal.visible {
            display: flex;
        }

        .call-container {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: #1a1a1a;
            border: 3px solid cyan;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .call-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid magenta;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .call-header h3 {
            color: cyan;
        }

        .call-header .call-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }

        .join-call-btn {
            background: cyan;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .join-call-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px cyan;
        }

        .call-videos {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }

        .video-container {
            background: #2a2a2a;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 2px solid transparent;
        }

        .video-container.speaking {
            border-color: cyan;
            box-shadow: 0 0 30px cyan;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .call-controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .call-control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
        }

        .call-control-btn.end {
            background: #ff4444;
            color: white;
        }

        /* MODAL CREAR SALA */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 3px solid cyan;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            color: cyan;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid cyan;
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-save {
            background: cyan;
            color: black;
        }

        .modal-cancel {
            background: #ff4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="quantum-bg"></div>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-crystal">
            <div class="login-header">
                <h1>YB CHAT</h1>
                <div style="color: rgba(255,255,255,0.6);">✦ VERSIÓN FINAL ✦</div>
            </div>
            <div class="input-field">
                <label>👤 NOMBRE</label>
                <input type="text" id="username" placeholder="Ej: YB_Guerrero" autocomplete="off">
            </div>
            <div class="input-field">
                <label>🔐 CLAVE</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="login-btn" onclick="login()">ENTRAR</button>
            <div style="text-align: center; margin-top: 20px; color: rgba(255,255,255,0.3);">
                <span>YBdev_12383 / owner_12121027</span>
            </div>
        </div>
    </div>

    <!-- CHAT PRINCIPAL -->
    <div id="chatScreen">
        <div class="chat-container">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="user-profile">
                    <div class="profile-avatar" id="profileAvatar">YB</div>
                    <div class="profile-info">
                        <div class="profile-name">
                            <span id="profileName">Usuario</span>
                            <span class="owner-badge" id="profileOwnerBadge" style="display: none;">OWNER</span>
                        </div>
                        <div>
                            <span class="online-dot"></span>
                            <span style="color: rgba(255,255,255,0.6);">En línea</span>
                        </div>
                    </div>
                    <button class="logout-sidebar" onclick="logout()" style="background:none; border:2px solid #ff4444; color:#ff4444; padding:8px 15px; border-radius:15px; cursor:pointer;">✕</button>
                </div>

                <!-- BOTONES DE RECARGA MANUAL (ÚNICA FORMA DE ACTUALIZAR) -->
                <div class="refresh-section">
                    <button class="refresh-btn" onclick="refreshUsers()">
                        <span>🔄</span> RECARGAR USUARIOS
                    </button>
                    <button class="refresh-btn refresh-users" onclick="refreshAll()">
                        <span>⚡</span> TODO
                    </button>
                </div>

                <!-- SALAS -->
                <div class="rooms-section">
                    <div class="rooms-header">
                        <h4>📁 SALAS</h4>
                        <button class="create-room-btn" onclick="showCreateRoomModal()">+</button>
                    </div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>

                <!-- USUARIOS - SE ACUMULAN SIN DESAPARECER -->
                <div class="users-section">
                    <div class="users-header">
                        <span>👥 CONECTADOS</span>
                        <span class="online-count" id="onlineCount">0</span>
                    </div>
                    <div class="users-grid" id="usersGrid"></div>
                </div>
            </div>

            <!-- CHAT PRINCIPAL -->
            <div class="main-chat">
                <div class="chat-header">
                    <div class="current-room">
                        <div class="room-icon-large" id="roomIcon">#</div>
                        <div class="room-info-large">
                            <h2 id="roomName">General</h2>
                            <p id="roomDescription">Sala principal</p>
                        </div>
                    </div>
                    <div class="room-actions">
                        <div class="call-selector">
                            <button class="call-btn video" onclick="startCall('video')">
                                <span>📹</span> VIDEO
                            </button>
                            <button class="call-btn audio" onclick="startCall('audio')">
                                <span>🎤</span> VOZ
                            </button>
                        </div>
                        <button class="leave-room-btn" id="leaveRoomBtn" onclick="leaveRoom()" style="display: none;">SALIR</button>
                    </div>
                </div>

                <!-- MENSAJES -->
                <div class="messages-container" id="messagesContainer"></div>

                <!-- TYPING -->
                <div class="typing-indicator" id="typingIndicator"></div>

                <!-- INPUT -->
                <div class="input-area">
                    <div class="input-tools">
                        <button class="tool-btn" onclick="document.getElementById('imageInput').click()">📷 FOTO</button>
                        <button class="tool-btn file-btn" onclick="document.getElementById('videoInput').click()">🎥 VIDEO</button>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                        <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="sendVideo(this)">
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Escribe..." onkeypress="if(event.key==='Enter') sendMessage()" oninput="onUserTyping()">
                        <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL LLAMADA -->
    <div class="call-modal" id="callModal">
        <div class="call-container">
            <div class="call-header">
                <div>
                    <h3 id="callTitle">📹 VIDELLAMADA</h3>
                    <div class="call-info" id="callInfo">Iniciada por YB_Dios</div>
                </div>
                <button class="join-call-btn" id="joinCallBtn" onclick="joinCall()">UNIRSE A LA LLAMADA</button>
            </div>
            <div class="call-videos" id="callVideos"></div>
            <div class="call-controls">
                <button class="call-control-btn" onclick="toggleMuteAudio()">🎤</button>
                <button class="call-control-btn" onclick="toggleMuteVideo()">📹</button>
                <button class="call-control-btn end" onclick="endCall()">📞</button>
            </div>
        </div>
    </div>

    <!-- MODAL CREAR SALA -->
    <div class="modal" id="createRoomModal">
        <div class="modal-content">
            <h3>CREAR SALA</h3>
            <input type="text" id="newRoomName" placeholder="Nombre">
            <input type="text" id="newRoomPassword" placeholder="Contraseña (opcional)">
            <div class="modal-buttons">
                <button class="modal-save" onclick="createRoom()">CREAR</button>
                <button class="modal-cancel" onclick="closeCreateRoomModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN FINAL
        // ============================================
        const USER_PASSWORD = "YBdev_12383";
        const OWNER_PASSWORD = "owner_12121027";
        
        let currentUser = {
            name: '',
            id: '',
            isOwner: false,
            muted: false,
            currentRoom: 'general',
            typing: false
        };
        
        // BASES DE DATOS
        let messages = JSON.parse(localStorage.getItem('yb_messages_final')) || [];
        let users = JSON.parse(localStorage.getItem('yb_users_final')) || [];
        let bannedUsers = JSON.parse(localStorage.getItem('yb_banned_final')) || [];
        let mutedUsers = JSON.parse(localStorage.getItem('yb_muted_final')) || [];
        let rooms = JSON.parse(localStorage.getItem('yb_rooms_final')) || [
            { id: 'general', name: 'General', password: '', createdBy: 'system' },
            { id: 'random', name: 'Random', password: '', createdBy: 'system' }
        ];

        // Estado de llamada
        let activeCall = {
            active: false,
            initiator: null,
            type: 'video',
            participants: []
        };

        // ============================================
        // LOGIN
        // ============================================
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username) {
                alert('❌ Nombre requerido');
                return;
            }
            
            // Verificar baneados
            if (bannedUsers.includes(username)) {
                alert('🚫 Estás baneado');
                return;
            }
            
            // Verificar clave
            let isOwner = false;
            if (password === OWNER_PASSWORD) {
                isOwner = true;
            } else if (password !== USER_PASSWORD) {
                alert('❌ Clave incorrecta');
                return;
            }
            
            // Crear usuario (NUNCA eliminar existentes, solo añadir)
            currentUser = {
                name: username,
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                isOwner: isOwner,
                muted: mutedUsers.includes(username),
                currentRoom: 'general',
                typing: false
            };
            
            // AÑADIR nuevo usuario (sin eliminar nadie)
            users.push({
                name: currentUser.name,
                id: currentUser.id,
                isOwner: currentUser.isOwner,
                muted: currentUser.muted,
                currentRoom: 'general',
                typing: false
            });
            
            localStorage.setItem('yb_users_final', JSON.stringify(users));
            localStorage.setItem('yb_current_session', JSON.stringify({
                name: currentUser.name,
                id: currentUser.id,
                isOwner: currentUser.isOwner
            }));
            
            // Mostrar chat
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('visible');
            
            // Actualizar UI
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
            
            if (currentUser.isOwner) {
                document.getElementById('profileOwnerBadge').style.display = 'inline';
            }
            
            // Cargar datos
            loadRooms();
            loadMessages('general');
            updateUsersList(); // Mostrar TODOS los usuarios acumulados
            
            // Anunciar llegada
            addSystemMessage(`👋 ${currentUser.name} se ha unido`);
        }

        // ============================================
        // RECARGA MANUAL (ÚNICA FORMA DE ACTUALIZAR)
        // ============================================
        function refreshUsers() {
            // Recargar usuarios de localStorage pero MANTENER todos
            const storedUsers = JSON.parse(localStorage.getItem('yb_users_final')) || [];
            
            // AÑADIR los nuevos sin eliminar los existentes en UI
            storedUsers.forEach(storedUser => {
                if (!users.find(u => u.id === storedUser.id)) {
                    users.push(storedUser);
                }
            });
            
            localStorage.setItem('yb_users_final', JSON.stringify(users));
            updateUsersList();
            addSystemMessage('🔄 Lista de usuarios actualizada');
        }

        function refreshAll() {
            // Recargar TODO pero MANTENER todos los usuarios
            const storedUsers = JSON.parse(localStorage.getItem('yb_users_final')) || [];
            const storedMessages = JSON.parse(localStorage.getItem('yb_messages_final')) || [];
            const storedRooms = JSON.parse(localStorage.getItem('yb_rooms_final')) || [
                { id: 'general', name: 'General', password: '', createdBy: 'system' },
                { id: 'random', name: 'Random', password: '', createdBy: 'system' }
            ];
            
            // AÑADIR nuevos usuarios sin eliminar
            storedUsers.forEach(storedUser => {
                if (!users.find(u => u.id === storedUser.id)) {
                    users.push(storedUser);
                }
            });
            
            messages = storedMessages;
            rooms = storedRooms;
            
            localStorage.setItem('yb_users_final', JSON.stringify(users));
            
            updateUsersList();
            loadRooms();
            loadMessages(currentUser.currentRoom);
            addSystemMessage('⚡ Todo actualizado');
        }

        // ============================================
        // USUARIOS - SE ACUMULAN, NUNCA DESAPARECEN
        // ============================================
        function updateUsersList() {
            const grid = document.getElementById('usersGrid');
            
            grid.innerHTML = users.map(user => {
                const userRoom = rooms.find(r => r.id === user.currentRoom)?.name || 'General';
                const isCurrent = user.id === currentUser.id;
                const isMuted = mutedUsers.includes(user.name);
                
                return `
                    <div class="user-card">
                        <div class="user-avatar-small">${user.name.charAt(0).toUpperCase()}</div>
                        <div class="user-details">
                            <div class="user-name-display">
                                <span>${user.name} ${user.isOwner ? '👑' : ''} ${isCurrent ? '(tú)' : ''}</span>
                                ${isMuted ? '<span style="color:orange;">🔇</span>' : ''}
                            </div>
                            <div class="user-room-indicator">
                                <span class="user-status-dot"></span> ${userRoom}
                            </div>
                        </div>
                        ${currentUser.isOwner && !isCurrent && !user.isOwner ? `
                            <div style="display:flex; gap:5px;">
                                <button onclick="banUser('${user.id}')" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:3px 8px; border-radius:5px; font-size:0.7em;">BAN</button>
                                <button onclick="muteUser('${user.id}')" style="background:none; border:1px solid orange; color:orange; padding:3px 8px; border-radius:5px; font-size:0.7em;">MUTE</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('onlineCount').textContent = users.length;
        }

        // ============================================
        // PODERES OWNER
        // ============================================
        function banUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (!user || user.isOwner) return;
            
            bannedUsers.push(user.name);
            localStorage.setItem('yb_banned_final', JSON.stringify(bannedUsers));
            
            // NO eliminamos de users, solo marcamos como baneado en UI
            addSystemMessage(`🚫 ${user.name} ha sido baneado`, '#ff4444');
            refreshAll();
        }

        function muteUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (!user || user.isOwner) return;
            
            if (!mutedUsers.includes(user.name)) {
                mutedUsers.push(user.name);
                localStorage.setItem('yb_muted_final', JSON.stringify(mutedUsers));
            }
            
            user.muted = true;
            localStorage.setItem('yb_users_final', JSON.stringify(users));
            
            updateUsersList();
            addSystemMessage(`🔇 ${user.name} ha sido muteado`, 'orange');
        }

        // ============================================
        // SALAS
        // ============================================
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').classList.add('visible');
        }

        function closeCreateRoomModal() {
            document.getElementById('createRoomModal').classList.remove('visible');
            document.getElementById('newRoomName').value = '';
            document.getElementById('newRoomPassword').value = '';
        }

        function createRoom() {
            const name = document.getElementById('newRoomName').value.trim();
            const password = document.getElementById('newRoomPassword').value.trim();
            
            if (!name) return;
            
            const newRoom = {
                id: 'room_' + Date.now(),
                name: name,
                password: password,
                createdBy: currentUser.name
            };
            
            rooms.push(newRoom);
            localStorage.setItem('yb_rooms_final', JSON.stringify(rooms));
            
            loadRooms();
            closeCreateRoomModal();
            
            joinRoom(newRoom.id, password);
        }

        function joinRoom(roomId, password = '') {
            const room = rooms.find(r => r.id === roomId);
            if (!room) return;
            
            if (room.password && room.password !== password) {
                const pwd = prompt('Contraseña de la sala:');
                if (pwd !== room.password) {
                    alert('Contraseña incorrecta');
                    return;
                }
            }
            
            if (currentUser.currentRoom !== 'general') {
                leaveRoom();
            }
            
            currentUser.currentRoom = roomId;
            
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].currentRoom = roomId;
                localStorage.setItem('yb_users_final', JSON.stringify(users));
            }
            
            document.getElementById('roomName').textContent = room.name;
            document.getElementById('roomDescription').textContent = `Creada por ${room.createdBy}`;
            document.getElementById('roomIcon').textContent = room.name.charAt(0);
            document.getElementById('leaveRoomBtn').style.display = 'inline-block';
            
            loadMessages(roomId);
            loadRooms();
            refreshUsers();
            
            addSystemMessage(`📌 Entraste a ${room.name}`);
        }

        function leaveRoom() {
            currentUser.currentRoom = 'general';
            
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].currentRoom = 'general';
                localStorage.setItem('yb_users_final', JSON.stringify(users));
            }
            
            document.getElementById('roomName').textContent = 'General';
            document.getElementById('roomDescription').textContent = 'Sala principal';
            document.getElementById('roomIcon').textContent = '#';
            document.getElementById('leaveRoomBtn').style.display = 'none';
            
            loadMessages('general');
            loadRooms();
            refreshUsers();
        }

        function loadRooms() {
            const list = document.getElementById('roomsList');
            
            list.innerHTML = rooms.map(room => {
                const userCount = users.filter(u => u.currentRoom === room.id).length;
                const isActive = currentUser.currentRoom === room.id;
                
                return `
                    <div class="room-item ${isActive ? 'active' : ''}" onclick="joinRoom('${room.id}')">
                        <div class="room-icon">${room.name.charAt(0)}</div>
                        <div class="room-info">
                            <div class="room-name">${room.name}</div>
                            <div class="room-count">👤 ${userCount}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // MENSAJES
        // ============================================
        function sendMessage() {
            if (currentUser.muted) {
                alert('🔇 Estás muteado');
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const message = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                user: currentUser.name,
                userId: currentUser.id,
                room: currentUser.currentRoom,
                text: text,
                type: 'text',
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now()
            };
            
            messages.push(message);
            localStorage.setItem('yb_messages_final', JSON.stringify(messages));
            
            displayMessage(message);
            input.value = '';
        }

        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    user: currentUser.name,
                    userId: currentUser.id,
                    room: currentUser.currentRoom,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                localStorage.setItem('yb_messages_final', JSON.stringify(messages));
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
        }

        function sendVideo(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    user: currentUser.name,
                    userId: currentUser.id,
                    room: currentUser.currentRoom,
                    type: 'video',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                localStorage.setItem('yb_messages_final', JSON.stringify(messages));
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
        }

        function deleteMessage(messageId) {
            const message = messages.find(m => m.id === messageId);
            
            if (message && (message.userId === currentUser.id || currentUser.isOwner)) {
                messages = messages.filter(m => m.id !== messageId);
                localStorage.setItem('yb_messages_final', JSON.stringify(messages));
                loadMessages(currentUser.currentRoom);
            }
        }

        function displayMessage(message) {
            if (message.room !== currentUser.currentRoom) return;
            
            const container = document.getElementById('messagesContainer');
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${message.userId === currentUser.id ? 'own' : ''}`;
            
            let content = '';
            if (message.type === 'text') {
                content = `<div class="message-content">${message.text}</div>`;
            } else if (message.type === 'image') {
                content = `<img src="${message.content}" class="message-media" onclick="showImage('${message.content}')">`;
            } else if (message.type === 'video') {
                content = `<video src="${message.content}" controls class="message-media"></video>`;
            } else if (message.type === 'system') {
                wrapper.style.justifyContent = 'center';
                content = `<div style="color: ${message.color || 'cyan'}; background: rgba(0,0,0,0.3); padding:8px 20px; border-radius:50px;">${message.text}</div>`;
            }
            
            wrapper.innerHTML = `
                <div class="message-bubble">
                    <div class="message-header">
                        <span class="message-sender">${message.user === currentUser.name ? 'Tú' : message.user}</span>
                        <span class="message-time">${message.time || ''}</span>
                    </div>
                    ${content}
                    ${(message.userId === currentUser.id || currentUser.isOwner) && message.type !== 'system' ? 
                        `<button class="delete-message" onclick="deleteMessage('${message.id}')">✕</button>` : ''}
                </div>
            `;
            
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function loadMessages(roomId) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            messages
                .filter(m => m.room === roomId)
                .slice(-100)
                .forEach(msg => displayMessage(msg));
        }

        function addSystemMessage(text, color = 'cyan') {
            const message = {
                id: 'sys_' + Date.now(),
                type: 'system',
                text: text,
                room: currentUser.currentRoom,
                time: new Date().toLocaleTimeString(),
                color: color
            };
            
            displayMessage(message);
        }

        // ============================================
        // TYPING INDICATOR
        // ============================================
        function onUserTyping() {
            if (!currentUser.typing) {
                currentUser.typing = true;
                updateTypingStatus();
                
                setTimeout(() => {
                    currentUser.typing = false;
                    updateTypingStatus();
                }, 3000);
            }
        }

        function updateTypingStatus() {
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].typing = currentUser.typing;
                localStorage.setItem('yb_users_final', JSON.stringify(users));
            }
            
            const typingUsers = users.filter(u => 
                u.typing && 
                u.currentRoom === currentUser.currentRoom &&
                u.id !== currentUser.id
            );
            
            const indicator = document.getElementById('typingIndicator');
            
            if (typingUsers.length === 0) {
                indicator.textContent = '';
            } else if (typingUsers.length === 1) {
                indicator.textContent = `${typingUsers[0].name} está escribiendo...`;
            } else if (typingUsers.length === 2) {
                indicator.textContent = `${typingUsers[0].name} y ${typingUsers[1].name} están escribiendo...`;
            } else {
                indicator.textContent = `Varias personas están escribiendo...`;
            }
        }

        // ============================================
        // LLAMADAS - CON BOTÓN PARA UNIRSE
        // ============================================
        let localStream;
        let callType = 'video';

        async function startCall(type) {
            callType = type;
            
            try {
                const constraints = {
                    video: type === 'video',
                    audio: true
                };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Activar llamada
                activeCall.active = true;
                activeCall.initiator = currentUser.name;
                activeCall.type = type;
                activeCall.participants = [currentUser.id];
                
                document.getElementById('callTitle').textContent = type === 'video' ? '📹 VIDELLAMADA' : '🎤 LLAMADA DE VOZ';
                document.getElementById('callInfo').textContent = `Iniciada por ${currentUser.name}`;
                document.getElementById('callModal').classList.add('visible');
                document.getElementById('joinCallBtn').style.display = 'inline-block';
                
                const videosContainer = document.getElementById('callVideos');
                videosContainer.innerHTML = '';
                
                // Añadir video local
                addLocalVideoToCall();
                
                addSystemMessage(`📞 ${currentUser.name} inició una llamada de ${type}`, 'magenta');
                
            } catch (err) {
                alert('Error con cámara/micrófono');
            }
        }

        function addLocalVideoToCall() {
            const videosContainer = document.getElementById('callVideos');
            
            const localContainer = document.createElement('div');
            localContainer.className = 'video-container';
            localContainer.id = 'localVideoContainer';
            
            if (callType === 'video') {
                const video = document.createElement('video');
                video.autoplay = true;
                video.muted = true;
                video.srcObject = localStream;
                localContainer.appendChild(video);
            } else {
                localContainer.innerHTML = `
                    <div style="height:100%; display:flex; align-items:center; justify-content:center; background:#2a2a2a;">
                        <div style="width:100px; height:100px; border-radius:50%; background:linear-gradient(45deg,cyan,magenta); display:flex; align-items:center; justify-content:center; font-size:3em;">
                            ${currentUser.name.charAt(0)}
                        </div>
                    </div>
                `;
            }
            
            const label = document.createElement('div');
            label.className = 'video-label';
            label.textContent = `${currentUser.name} (tú)`;
            localContainer.appendChild(label);
            
            videosContainer.appendChild(localContainer);
        }

        function joinCall() {
            if (!activeCall.active) {
                alert('No hay ninguna llamada activa');
                return;
            }
            
            if (activeCall.participants.includes(currentUser.id)) {
                alert('Ya estás en la llamada');
                return;
            }
            
            // Unirse a la llamada existente
            activeCall.participants.push(currentUser.id);
            
            // Añadir video del nuevo participante
            const videosContainer = document.getElementById('callVideos');
            
            const participantContainer = document.createElement('div');
            participantContainer.className = 'video-container';
            
            if (activeCall.type === 'video') {
                // Simular video (en realidad necesitaríamos WebRTC, pero para demo)
                participantContainer.innerHTML = `
                    <div style="height:100%; display:flex; align-items:center; justify-content:center; background:#2a2a2a;">
                        <div style="width:80px; height:80px; border-radius:50%; background:linear-gradient(45deg,#666,#888); display:flex; align-items:center; justify-content:center; font-size:2em;">
                            ${currentUser.name.charAt(0)}
                        </div>
                    </div>
                `;
            } else {
                participantContainer.innerHTML = `
                    <div style="height:100%; display:flex; align-items:center; justify-content:center; background:#2a2a2a;">
                        <div style="width:80px; height:80px; border-radius:50%; background:linear-gradient(45deg,#666,#888); display:flex; align-items:center; justify-content:center; font-size:2em;">
                            ${currentUser.name.charAt(0)}
                        </div>
                    </div>
                `;
            }
            
            const label = document.createElement('div');
            label.className = 'video-label';
            label.textContent = currentUser.name;
            participantContainer.appendChild(label);
            
            videosContainer.appendChild(participantContainer);
            
            addSystemMessage(`📞 ${currentUser.name} se unió a la llamada`, 'cyan');
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            activeCall.active = false;
            activeCall.participants = [];
            
            document.getElementById('callModal').classList.remove('visible');
            
            addSystemMessage(`📞 Llamada finalizada`, 'orange');
        }

        function toggleMuteAudio() {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                track.enabled = !track.enabled;
            }
        }

        function toggleMuteVideo() {
            if (localStream && callType === 'video') {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
            }
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function showImage(src) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:3000;';
            modal.innerHTML = `
                <img src="${src}" style="max-width:90%; max-height:90%; border:4px solid cyan; border-radius:20px;">
                <button onclick="this.parentElement.remove()" style="position:absolute; top:30px; right:30px; background:#ff4444; border:none; width:50px; height:50px; border-radius:50%; color:white; font-size:1.5em; cursor:pointer;">✕</button>
            `;
            document.body.appendChild(modal);
        }

        function logout() {
            // NO eliminamos el usuario, solo ocultamos chat
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.remove('visible');
            
            // Limpiar sesión
            localStorage.removeItem('yb_current_session');
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        function checkSavedSession() {
            const session = localStorage.getItem('yb_current_session');
            if (session) {
                const data = JSON.parse(session);
                document.getElementById('username').value = data.name;
                
                // Auto-login después de 100ms
                setTimeout(() => {
                    login();
                }, 100);
            }
        }

        checkSavedSession();
    </script>
</body>
</html>
