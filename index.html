<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YB CHAT - TIEMPO REAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a0a, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Fondo dinámico */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 2px,
                rgba(255, 0, 255, 0.03) 2px,
                rgba(0, 255, 255, 0.03) 4px
            );
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* PANTALLA DE LOGIN */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
        }

        #loginScreen.hidden {
            display: none;
        }

        .login-container {
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid;
            border-image: linear-gradient(45deg, cyan, magenta) 1;
            border-radius: 40px;
            padding: 50px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
        }

        .login-container h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(45deg, cyan, magenta);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: cyan;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
        }

        .input-group input:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px cyan;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            color: black;
            font-weight: 900;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px cyan;
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        /* CHAT PRINCIPAL */
        #chatScreen {
            width: 100%;
            height: 100vh;
            display: none;
        }

        #chatScreen.visible {
            display: block;
        }

        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }

        /* SIDEBAR DE USUARIOS */
        .users-sidebar {
            width: 300px;
            background: rgba(10, 10, 20, 0.9);
            border-right: 2px solid rgba(cyan, 0.3);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 2px solid rgba(cyan, 0.3);
        }

        .sidebar-header h3 {
            color: cyan;
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .owner-badge {
            color: gold;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            transition: all 0.3s;
            position: relative;
            border: 1px solid transparent;
        }

        .user-item.online {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .user-item.offline {
            opacity: 0.5;
        }

        .user-item.muted {
            opacity: 0.5;
            background: rgba(255, 0, 0, 0.1);
        }

        .user-item.owner-user {
            border: 2px solid gold;
            box-shadow: 0 0 20px gold;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-dot.offline {
            background: #666;
            animation: none;
        }

        .user-actions {
            display: none;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            gap: 5px;
        }

        .user-item:hover .user-actions {
            display: flex;
        }

        .action-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid;
            border-radius: 5px;
            padding: 5px 8px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .action-btn.ban {
            border-color: #ff4444;
            color: #ff4444;
        }

        .action-btn.mute {
            border-color: orange;
            color: orange;
        }

        .action-btn.rename {
            border-color: cyan;
            color: cyan;
        }

        .action-btn:hover {
            background: currentColor;
            color: black;
        }

        /* CHAT PRINCIPAL */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid rgba(magenta, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            color: magenta;
            font-size: 1.8em;
        }

        .current-user {
            background: linear-gradient(45deg, cyan, magenta);
            padding: 10px 20px;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .current-user.owner {
            background: linear-gradient(45deg, gold, orange);
        }

        .logout-small {
            background: none;
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
        }

        .logout-small:hover {
            background: #ff4444;
            color: black;
        }

        /* ÁREA DE MENSAJES */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 10px;
            animation: messageAppear 0.3s;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.own-message {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(cyan, 0.3);
            border-radius: 25px;
            padding: 15px 20px;
            position: relative;
        }

        .own-message .message-bubble {
            background: linear-gradient(135deg, rgba(cyan, 0.2), rgba(magenta, 0.2));
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: cyan;
        }

        .message-time {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7em;
        }

        .message-text {
            color: white;
            word-wrap: break-word;
        }

        .message-media {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .message-wrapper:hover .delete-btn {
            display: flex;
        }

        /* ÁREA DE ENVÍO */
        .send-area {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 2px solid rgba(cyan, 0.3);
        }

        .muted-notice {
            background: rgba(255, 165, 0, 0.2);
            border: 2px solid orange;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            color: orange;
            margin-bottom: 15px;
            display: none;
        }

        .send-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid cyan;
            color: cyan;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-btn.call-btn {
            border-color: magenta;
            color: magenta;
        }

        .tool-btn:hover {
            background: cyan;
            color: black;
        }

        .send-input-area {
            display: flex;
            gap: 15px;
        }

        .send-input-area input {
            flex: 1;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
        }

        .send-input-area input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn {
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            padding: 0 40px;
            color: black;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* MODAL DE VIDELLAMADA */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .call-modal.visible {
            display: flex;
        }

        .call-container {
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: #1a1a1a;
            border-radius: 30px;
            border: 3px solid cyan;
            overflow: hidden;
        }

        .call-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid magenta;
            display: flex;
            justify-content: space-between;
        }

        .call-videos {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .video-container {
            background: #2a2a2a;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .call-controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .call-control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
        }

        .call-control-btn.end-call {
            background: #ff4444;
            color: white;
        }

        /* MODAL DE RENOMBRAR */
        .rename-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .rename-modal.visible {
            display: flex;
        }

        .rename-container {
            background: #1a1a1a;
            border: 3px solid cyan;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }

        .rename-container h3 {
            color: cyan;
            margin-bottom: 20px;
        }

        .rename-container input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid cyan;
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }

        .rename-buttons {
            display: flex;
            gap: 10px;
        }

        .rename-buttons button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        .rename-save {
            background: cyan;
            color: black;
        }

        .rename-cancel {
            background: #ff4444;
            color: white;
        }

        /* BANEADOS */
        .banned-users {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff4444;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .banned-title {
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .banned-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .unban-btn {
            background: #00ff00;
            color: black;
            border: none;
            padding: 3px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* MODAL DE IMAGEN */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .image-modal.visible {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid cyan;
            border-radius: 20px;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #ff4444;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE LOGIN -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>YB CHAT</h1>
            <div class="input-group">
                <label>👤 TU NOMBRE</label>
                <input type="text" id="username" placeholder="Ej: YB_Guerrero" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔐 CLAVE DE ACCESO</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <button class="login-btn" onclick="login()">ENTRAR AL CHAT</button>
            
            <div class="error-message" id="loginError">❌ Clave incorrecta</div>
        </div>
    </div>

    <!-- CHAT PRINCIPAL -->
    <div id="chatScreen">
        <div class="chat-container">
            <!-- SIDEBAR DE USUARIOS -->
            <div class="users-sidebar">
                <div class="sidebar-header">
                    <h3>YB CHAT <span class="owner-badge" id="ownerBadge" style="display: none;">👑 OWNER</span></h3>
                    <div class="online-count">
                        <span>🟢</span> <span id="onlineCount">0</span> conectados
                    </div>
                </div>
                
                <div class="users-list" id="usersList">
                    <!-- Usuarios aparecerán aquí -->
                </div>

                <!-- LISTA DE BANEADOS (solo owner) -->
                <div class="banned-users" id="bannedList" style="display: none;">
                    <div class="banned-title">🚫 USUARIOS BANEADOS</div>
                    <div id="bannedUsers"></div>
                </div>
            </div>

            <!-- CHAT PRINCIPAL -->
            <div class="chat-main">
                <div class="chat-header">
                    <h2># CHAT EN VIVO</h2>
                    <div class="current-user" id="currentUserDisplay">
                        <span>👤</span>
                        <span id="currentUserName">Usuario</span>
                        <button class="logout-small" onclick="logout()">✕</button>
                    </div>
                </div>

                <!-- NOTIFICACIÓN DE MUTE -->
                <div class="muted-notice" id="mutedNotice">
                    🔇 ESTÁS MUTEADO - NO PUEDES ENVIAR MENSAJES
                </div>

                <!-- ÁREA DE MENSAJES -->
                <div class="messages-area" id="messagesArea"></div>

                <!-- ÁREA DE ENVÍO -->
                <div class="send-area">
                    <div class="send-tools">
                        <button class="tool-btn" onclick="document.getElementById('imageInput').click()" id="imageBtn">
                            📷 FOTO
                        </button>
                        <button class="tool-btn" onclick="document.getElementById('videoInput').click()" id="videoBtn">
                            🎥 VIDEO
                        </button>
                        <button class="tool-btn call-btn" onclick="startCall()" id="callBtn">
                            📞 LLAMADA
                        </button>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                        <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="sendVideo(this)">
                    </div>
                    
                    <div class="send-input-area">
                        <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VIDELLAMADA -->
    <div class="call-modal" id="callModal">
        <div class="call-container">
            <div class="call-header">
                <h3>📹 VIDELLAMADA</h3>
                <button class="close-call" onclick="endCall()">✕</button>
            </div>
            
            <div class="call-videos" id="callVideos">
                <!-- Videos -->
            </div>
            
            <div class="call-controls">
                <button class="call-control-btn" onclick="toggleMuteAudio()">🎤</button>
                <button class="call-control-btn" onclick="toggleMuteVideo()">📹</button>
                <button class="call-control-btn end-call" onclick="endCall()">📞</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE RENOMBRAR -->
    <div class="rename-modal" id="renameModal">
        <div class="rename-container">
            <h3 id="renameTitle">Cambiar nombre</h3>
            <input type="text" id="newName" placeholder="Nuevo nombre">
            <div class="rename-buttons">
                <button class="rename-save" onclick="saveRename()">GUARDAR</button>
                <button class="rename-cancel" onclick="closeRename()">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE IMAGEN -->
    <div class="image-modal" id="imageModal">
        <img id="modalImage" src="" alt="">
        <button class="close-modal" onclick="document.getElementById('imageModal').classList.remove('visible')">✕</button>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const USER_PASSWORD = "YBdev_12383";
        const OWNER_PASSWORD = "owner_12121027";
        
        let currentUser = {
            name: '',
            id: '',
            isOwner: false,
            muted: false
        };
        
        // BASES DE DATOS
        let messages = JSON.parse(localStorage.getItem('yb_messages_real')) || [];
        let users = JSON.parse(localStorage.getItem('yb_users_real')) || [];
        let bannedUsers = JSON.parse(localStorage.getItem('yb_banned_real')) || [];
        let mutedUsers = JSON.parse(localStorage.getItem('yb_muted_real')) || [];

        // ============================================
        // LOGIN
        // ============================================
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username) {
                alert('❌ Debes poner un nombre');
                return;
            }
            
            // Verificar si está baneado
            if (bannedUsers.includes(username)) {
                alert('🚫 ESTÁS BANEADO');
                return;
            }
            
            // Verificar clave
            let isOwner = false;
            if (password === OWNER_PASSWORD) {
                isOwner = true;
            } else if (password !== USER_PASSWORD) {
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            
            // Crear usuario
            currentUser = {
                name: username,
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                isOwner: isOwner,
                muted: mutedUsers.includes(username)
            };
            
            // Guardar en lista
            users.push({
                name: currentUser.name,
                id: currentUser.id,
                isOwner: currentUser.isOwner,
                muted: currentUser.muted,
                online: true,
                lastSeen: Date.now()
            });
            
            localStorage.setItem('yb_users_real', JSON.stringify(users));
            
            // Mostrar chat
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').classList.add('visible');
            document.getElementById('currentUserName').textContent = currentUser.name;
            
            if (currentUser.isOwner) {
                document.getElementById('ownerBadge').style.display = 'inline';
                document.getElementById('currentUserDisplay').classList.add('owner');
                document.getElementById('bannedList').style.display = 'block';
                updateBannedList();
            }
            
            if (currentUser.muted) {
                document.getElementById('mutedNotice').style.display = 'block';
                disableInputs(true);
            }
            
            // Cargar datos y empezar actualización en tiempo real
            loadMessages();
            updateUsersList();
            
            // ACTUALIZACIÓN EN TIEMPO REAL (cada 1 segundo)
            setInterval(() => {
                checkForNewMessages();
                updateUsersList();
                updateUserOnlineStatus();
            }, 1000);
        }

        // ============================================
        // TIEMPO REAL - CORAZÓN DEL CHAT
        // ============================================
        let lastMessageCount = messages.length;
        
        function checkForNewMessages() {
            const currentMessages = JSON.parse(localStorage.getItem('yb_messages_real')) || [];
            
            // Si hay nuevos mensajes
            if (currentMessages.length > lastMessageCount) {
                const newMessages = currentMessages.slice(lastMessageCount);
                messages = currentMessages;
                
                // Mostrar solo los nuevos
                newMessages.forEach(msg => {
                    displayMessage(msg);
                });
                
                lastMessageCount = currentMessages.length;
            }
            
            // Actualizar mensajes existentes (por si alguien borró)
            if (currentMessages.length < messages.length) {
                messages = currentMessages;
                loadMessages(); // Recargar todo si alguien borró
                lastMessageCount = currentMessages.length;
            }
        }

        function updateUserOnlineStatus() {
            const now = Date.now();
            
            // Actualizar lastSeen cada 3 segundos
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].lastSeen = now;
                localStorage.setItem('yb_users_real', JSON.stringify(users));
            }
            
            // Marcar offline si no se han actualizado en 5 segundos
            users.forEach(u => {
                if (now - u.lastSeen > 5000) {
                    u.online = false;
                } else {
                    u.online = true;
                }
            });
            
            localStorage.setItem('yb_users_real', JSON.stringify(users));
        }

        // ============================================
        // PODERES DEL OWNER
        // ============================================
        function banUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (!user || user.isOwner) return;
            
            // Banear
            if (!bannedUsers.includes(user.name)) {
                bannedUsers.push(user.name);
                localStorage.setItem('yb_banned_real', JSON.stringify(bannedUsers));
            }
            
            // Eliminar usuario
            users = users.filter(u => u.id !== userId);
            localStorage.setItem('yb_users_real', JSON.stringify(users));
            
            // Eliminar sus mensajes
            messages = messages.filter(m => m.userId !== userId);
            localStorage.setItem('yb_messages_real', JSON.stringify(messages));
            
            updateUsersList();
            updateBannedList();
            loadMessages();
            
            alert(`✅ ${user.name} baneado`);
        }

        function muteUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (!user || user.isOwner) return;
            
            if (!mutedUsers.includes(user.name)) {
                mutedUsers.push(user.name);
                localStorage.setItem('yb_muted_real', JSON.stringify(mutedUsers));
            }
            
            user.muted = true;
            localStorage.setItem('yb_users_real', JSON.stringify(users));
            
            updateUsersList();
        }

        function unmuteUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (user) {
                mutedUsers = mutedUsers.filter(u => u !== user.name);
                localStorage.setItem('yb_muted_real', JSON.stringify(mutedUsers));
                user.muted = false;
                localStorage.setItem('yb_users_real', JSON.stringify(users));
                updateUsersList();
            }
        }

        function unbanUser(username) {
            bannedUsers = bannedUsers.filter(u => u !== username);
            localStorage.setItem('yb_banned_real', JSON.stringify(bannedUsers));
            updateBannedList();
        }

        function renameUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('renameModal').classList.add('visible');
                document.getElementById('renameTitle').textContent = `Cambiar nombre de ${user.name}`;
                document.getElementById('newName').dataset.userId = userId;
            }
        }

        function saveRename() {
            const newName = document.getElementById('newName').value.trim();
            const userId = document.getElementById('newName').dataset.userId;
            
            if (!newName) return;
            
            const user = users.find(u => u.id === userId);
            if (user) {
                const oldName = user.name;
                user.name = newName;
                
                // Actualizar en mensajes
                messages.forEach(msg => {
                    if (msg.userId === userId) {
                        msg.user = newName;
                    }
                });
                
                localStorage.setItem('yb_users_real', JSON.stringify(users));
                localStorage.setItem('yb_messages_real', JSON.stringify(messages));
                
                if (currentUser.id === userId) {
                    currentUser.name = newName;
                    document.getElementById('currentUserName').textContent = newName;
                }
                
                updateUsersList();
                loadMessages();
            }
            
            closeRename();
        }

        function closeRename() {
            document.getElementById('renameModal').classList.remove('visible');
            document.getElementById('newName').value = '';
        }

        // ============================================
        // MENSAJES
        // ============================================
        function sendMessage() {
            if (currentUser.muted) {
                alert('🔇 Estás muteado');
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const message = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                user: currentUser.name,
                userId: currentUser.id,
                text: text,
                type: 'text',
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now()
            };
            
            messages.push(message);
            localStorage.setItem('yb_messages_real', JSON.stringify(messages));
            displayMessage(message);
            
            input.value = '';
        }

        function sendImage(input) {
            if (currentUser.muted) return;
            
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    user: currentUser.name,
                    userId: currentUser.id,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                localStorage.setItem('yb_messages_real', JSON.stringify(messages));
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
        }

        function sendVideo(input) {
            if (currentUser.muted) return;
            
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    user: currentUser.name,
                    userId: currentUser.id,
                    type: 'video',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                localStorage.setItem('yb_messages_real', JSON.stringify(messages));
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
        }

        function deleteMessage(messageId) {
            const message = messages.find(m => m.id === messageId);
            
            if (message && (message.userId === currentUser.id || currentUser.isOwner)) {
                messages = messages.filter(m => m.id !== messageId);
                localStorage.setItem('yb_messages_real', JSON.stringify(messages));
                loadMessages();
            }
        }

        function displayMessage(message) {
            const area = document.getElementById('messagesArea');
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${message.userId === currentUser.id ? 'own-message' : ''}`;
            
            let content = '';
            if (message.type === 'text') {
                content = `<div class="message-text">${message.text}</div>`;
            } else if (message.type === 'image') {
                content = `<img src="${message.content}" class="message-media" onclick="showImage('${message.content}')">`;
            } else if (message.type === 'video') {
                content = `<video src="${message.content}" controls class="message-media"></video>`;
            }
            
            wrapper.innerHTML = `
                <div class="message-bubble">
                    <div class="message-header">
                        <span>${message.user}</span>
                        <span class="message-time">${message.time}</span>
                    </div>
                    ${content}
                    ${(message.userId === currentUser.id || currentUser.isOwner) ? 
                        `<button class="delete-btn" onclick="deleteMessage('${message.id}')">✕</button>` : ''}
                </div>
            `;
            
            area.appendChild(wrapper);
            area.scrollTop = area.scrollHeight;
        }

        function loadMessages() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            messages.slice(-100).forEach(msg => displayMessage(msg));
        }

        // ============================================
        // USUARIOS
        // ============================================
        function updateUsersList() {
            const list = document.getElementById('usersList');
            const now = Date.now();
            
            // Actualizar online status
            users.forEach(u => {
                u.online = (now - u.lastSeen < 5000);
            });
            
            list.innerHTML = users.map(user => {
                const isMuted = mutedUsers.includes(user.name);
                const isOnline = user.online;
                
                return `
                    <div class="user-item ${isOnline ? 'online' : 'offline'} ${isMuted ? 'muted' : ''} ${user.isOwner ? 'owner-user' : ''}">
                        <div class="user-avatar">${user.name.charAt(0)}</div>
                        <div class="user-info">
                            <div class="user-name">
                                ${user.name} ${user.isOwner ? '👑' : ''}
                                ${isMuted ? '🔇' : ''}
                            </div>
                            <div class="user-status">
                                <span class="status-dot ${isOnline ? '' : 'offline'}"></span>
                                ${isOnline ? 'En línea' : 'Desconectado'}
                            </div>
                        </div>
                        
                        ${currentUser.isOwner && !user.isOwner ? `
                            <div class="user-actions">
                                <button class="action-btn ban" onclick="banUser('${user.id}')">BAN</button>
                                ${isMuted ? 
                                    `<button class="action-btn" onclick="unmuteUser('${user.id}')">UNMUTE</button>` :
                                    `<button class="action-btn mute" onclick="muteUser('${user.id}')">MUTE</button>`
                                }
                                <button class="action-btn rename" onclick="renameUser('${user.id}')">REN</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            const onlineCount = users.filter(u => u.online).length;
            document.getElementById('onlineCount').textContent = onlineCount;
        }

        function updateBannedList() {
            const container = document.getElementById('bannedUsers');
            container.innerHTML = bannedUsers.map(user => `
                <div class="banned-item">
                    <span>🚫 ${user}</span>
                    <button class="unban-btn" onclick="unbanUser('${user}')">QUITAR BAN</button>
                </div>
            `).join('');
        }

        function disableInputs(disabled) {
            document.getElementById('messageInput').disabled = disabled;
            document.getElementById('sendBtn').disabled = disabled;
            document.getElementById('imageBtn').disabled = disabled;
            document.getElementById('videoBtn').disabled = disabled;
            document.getElementById('callBtn').disabled = disabled;
        }

        // ============================================
        // VIDELLAMADA
        // ============================================
        let localStream;

        async function startCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                document.getElementById('callModal').classList.add('visible');
                
                const localVideo = document.createElement('video');
                localVideo.autoplay = true;
                localVideo.muted = true;
                localVideo.srcObject = localStream;
                
                const container = document.createElement('div');
                container.className = 'video-container';
                container.innerHTML = '<div class="video-label">Tú</div>';
                container.appendChild(localVideo);
                
                document.getElementById('callVideos').appendChild(container);
                
            } catch (err) {
                alert('Error con cámara/micrófono');
            }
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('callModal').classList.remove('visible');
            document.getElementById('callVideos').innerHTML = '';
        }

        function toggleMuteAudio() {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                track.enabled = !track.enabled;
            }
        }

        function toggleMuteVideo() {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
            }
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function showImage(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('visible');
        }

        function logout() {
            users = users.filter(u => u.id !== currentUser.id);
            localStorage.setItem('yb_users_real', JSON.stringify(users));
            
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('chatScreen').classList.remove('visible');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // ENTER para login
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
