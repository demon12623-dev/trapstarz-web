<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YB CHAT - ULTIMATE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 0% 0%, #0f0f1e, #030314);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Fondo con partículas cuánticas */
        .quantum-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .particle-grid {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* PANTALLA DE LOGIN - DISEÑO ÉPICO */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(3, 3, 20, 0.95);
            backdrop-filter: blur(20px);
        }

        #loginScreen.hidden {
            display: none;
        }

        .login-crystal {
            position: relative;
            width: 500px;
            padding: 50px;
            background: rgba(10, 10, 30, 0.6);
            border-radius: 50px;
            border: 2px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            animation: crystalPulse 3s infinite;
            overflow: hidden;
        }

        .login-crystal::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, cyan, magenta, cyan, magenta);
            border-radius: 50px;
            z-index: -1;
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes crystalPulse {
            0%, 100% { box-shadow: 0 0 50px rgba(0, 255, 255, 0.3), 0 0 100px rgba(255, 0, 255, 0.2); }
            50% { box-shadow: 0 0 80px rgba(0, 255, 255, 0.5), 0 0 150px rgba(255, 0, 255, 0.4); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .login-header h1 {
            font-size: 4em;
            font-weight: 900;
            background: linear-gradient(45deg, cyan, magenta, cyan);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: titleGlitch 3s infinite;
        }

        @keyframes titleGlitch {
            0%, 100% { transform: skew(0deg); }
            95% { transform: skew(0deg); }
            96% { transform: skew(5deg); text-shadow: -5px 0 cyan, 5px 0 magenta; }
            97% { transform: skew(-5deg); }
            98% { transform: skew(0deg); }
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1em;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .login-subtitle span {
            color: cyan;
            text-shadow: 0 0 10px cyan;
        }

        .input-field {
            margin-bottom: 25px;
            position: relative;
        }

        .input-field label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .input-field input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .input-field .glow-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, cyan, magenta);
            transition: width 0.3s;
        }

        .input-field input:focus ~ .glow-line {
            width: 100%;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            color: black;
            font-weight: 900;
            font-size: 1.3em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px cyan, 0 0 80px magenta;
        }

        /* CHAT PRINCIPAL */
        #chatScreen {
            width: 100%;
            height: 100vh;
            display: none;
            position: relative;
        }

        #chatScreen.visible {
            display: block;
        }

        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        /* SIDEBAR - DISEÑO MEJORADO */
        .sidebar {
            width: 320px;
            background: rgba(8, 8, 20, 0.9);
            border-right: 2px solid rgba(cyan, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .sidebar::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, cyan, magenta, transparent);
        }

        .user-profile {
            padding: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(magenta, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: black;
            box-shadow: 0 0 30px rgba(cyan, 0.3);
            animation: avatarPulse 3s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 30px cyan; }
            50% { box-shadow: 0 0 50px magenta; }
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .owner-badge {
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .profile-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .logout-sidebar {
            background: none;
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .logout-sidebar:hover {
            background: #ff4444;
            color: black;
        }

        /* SALAS PRIVADAS */
        .rooms-section {
            padding: 20px;
            border-bottom: 2px solid rgba(cyan, 0.2);
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .rooms-header h4 {
            color: cyan;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .create-room-btn {
            background: rgba(cyan, 0.1);
            border: 2px solid cyan;
            color: cyan;
            width: 35px;
            height: 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .create-room-btn:hover {
            background: cyan;
            color: black;
            transform: rotate(90deg);
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(cyan, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .room-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: linear-gradient(to bottom, cyan, magenta);
        }

        .room-item:hover {
            background: rgba(cyan, 0.1);
            transform: translateX(5px);
            border-color: cyan;
        }

        .room-item.active {
            background: rgba(cyan, 0.15);
            border-color: cyan;
            box-shadow: 0 0 20px rgba(cyan, 0.3);
        }

        .room-icon {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            color: white;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .room-meta {
            display: flex;
            gap: 10px;
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
        }

        .room-badge {
            background: rgba(magenta, 0.3);
            color: magenta;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.7em;
        }

        /* USUARIOS EN LÍNEA */
        .users-section {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .online-count {
            color: cyan;
            font-weight: bold;
        }

        .users-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(cyan, 0.1);
            border-radius: 15px;
            transition: all 0.3s;
            animation: userAppear 0.5s;
        }

        @keyframes userAppear {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .user-card:hover {
            background: rgba(cyan, 0.05);
            border-color: cyan;
            transform: translateX(5px);
        }

        .user-card.online {
            border-left: 3px solid #00ff00;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
        }

        .user-details {
            flex: 1;
        }

        .user-name-display {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 3px;
        }

        .user-name-display span {
            color: white;
            font-weight: 600;
        }

        .user-status-text {
            font-size: 0.7em;
            color: #00ff00;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .user-status-text.offline {
            color: #666;
        }

        .user-actions-small {
            display: flex;
            gap: 5px;
        }

        .user-action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 0.7em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-action-btn.ban {
            border-color: #ff4444;
            color: #ff4444;
        }

        .user-action-btn.mute {
            border-color: orange;
            color: orange;
        }

        .user-action-btn.rename {
            border-color: cyan;
            color: cyan;
        }

        .user-action-btn:hover {
            background: currentColor;
            color: black;
        }

        /* CHAT PRINCIPAL */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(magenta, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-room {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .room-icon-large {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(45deg, cyan, magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: black;
        }

        .room-info-large h2 {
            color: cyan;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .room-info-large p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }

        .room-actions {
            display: flex;
            gap: 10px;
        }

        .room-action-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid cyan;
            color: cyan;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .room-action-btn:hover {
            background: cyan;
            color: black;
        }

        /* MENSAJES */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 5px;
            animation: messageSlide 0.3s;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(cyan, 0.2);
            border-radius: 25px;
            padding: 15px 20px;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .own .message-bubble {
            background: linear-gradient(135deg, rgba(cyan, 0.1), rgba(magenta, 0.1));
            border-color: magenta;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .message-sender {
            color: cyan;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .own .message-sender {
            color: magenta;
        }

        .message-time {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7em;
        }

        .message-content {
            color: white;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-media {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-top: 10px;
            cursor: pointer;
            border: 2px solid rgba(cyan, 0.3);
        }

        .message-media:hover {
            border-color: cyan;
        }

        .delete-message {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .message-wrapper:hover .delete-message {
            display: flex;
        }

        /* TYPING INDICATOR */
        .typing-indicator {
            color: rgba(cyan, 0.6);
            font-size: 0.9em;
            padding: 5px 15px;
            font-style: italic;
            display: none;
        }

        /* INPUT AREA */
        .input-area {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 2px solid rgba(cyan, 0.2);
        }

        .input-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid cyan;
            color: cyan;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .tool-btn.file-btn {
            border-color: magenta;
            color: magenta;
        }

        .tool-btn:hover {
            background: cyan;
            color: black;
            transform: translateY(-2px);
        }

        .tool-btn.file-btn:hover {
            background: magenta;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(cyan, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .input-wrapper input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn {
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            border-radius: 20px;
            padding: 0 40px;
            color: black;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px cyan;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* MODAL PARA CREAR SALA */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 40, 0.9);
            border: 3px solid cyan;
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            animation: modalAppear 0.5s;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content h3 {
            color: cyan;
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid cyan;
            border-radius: 20px;
            color: white;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .modal-save {
            background: cyan;
            color: black;
        }

        .modal-cancel {
            background: #ff4444;
            color: white;
        }

        .modal-save:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px cyan;
        }

        .modal-cancel:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ff4444;
        }

        /* MODAL DE IMAGEN */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .image-modal.visible {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border: 4px solid cyan;
            border-radius: 30px;
            box-shadow: 0 0 100px cyan;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #ff4444;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        /* SCROLLBAR PERSONALIZADO */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {

            <div class="input-field">
                <label>👤 NOMBRE DE USUARIO</label>
                <input type="text" id="username" placeholder="Ej: YB_Guerrero" autocomplete="off">

            </div>

            <div class="input-field">
                <label>🔐 CLAVE DE ACCESO</label>

            <button class="login-btn" onclick="login()">

            </button>

            <div style="text-align: center; margin-top: 20px; color: rgba(255,255,255,0.3); font-size: 0.8em;">
                <span>✦ USA YBdev_12383 O owner_12121027 ✦</span>

    <!-- CHAT PRINCIPAL -->
    <div id="chatScreen">
        <div class="chat-container">

                        <div class="profile-status">

                <!-- SALAS PRIVADAS -->

            <!-- CHAT PRINCIPAL -->
            <div class="main-chat">
                <div class="chat-header">

                        <div class="room-icon-large" id="roomIcon">#</div>

                <!-- INPUT AREA -->
                <div class="input-area">

                            🎥 VIDEO
                        </button>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(this)">
                        <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="sendVideo(this)">
                    </div>

                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)" oninput="onUserTyping()">
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">ENVIAR</button>

    <!-- MODAL CREAR SALA -->
    <div class="modal" id="createRoomModal">
        <div class="modal-content">
            <h3>CREAR NUEVA SALA</h3>
            <input type="text" id="newRoomName" placeholder="Nombre de la sala">
            <input type="text" id="newRoomPassword" placeholder="Contraseña (opcional)">
            <div class="modal-buttons">
                <button class="modal-save" onclick="createRoom()">CREAR</button>
                <button class="modal-cancel" onclick="closeCreateRoomModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL RENOMBRAR -->
    <div class="modal" id="renameModal">
        <div class="modal-content">
            <h3 id="renameTitle">CAMBIAR NOMBRE</h3>
            <input type="text" id="newNameInput" placeholder="Nuevo nombre">
            <div class="modal-buttons">
                <button class="modal-save" onclick="saveRename()">GUARDAR</button>
                <button class="modal-cancel" onclick="closeRenameModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL IMAGEN -->
    <div class="image-modal" id="imageModal">
        <img id="modalImage" src="" alt="">
        <button class="close-modal" onclick="closeImageModal()">✕</button>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN GLOBAL
        // ============================================
        const USER_PASSWORD = "YBdev_12383";
        const OWNER_PASSWORD = "owner_12121027";
        
        let currentUser = {
            name: '',
            id: '',
            isOwner: false,
            muted: false,
            currentRoom: 'general',
            typing: false
        };
        
        // BASES DE DATOS
        let messages = JSON.parse(localStorage.getItem('yb_messages_ultimate')) || [];
        let users = JSON.parse(localStorage.getItem('yb_users_ultimate')) || [];
        let bannedUsers = JSON.parse(localStorage.getItem('yb_banned_ultimate')) || [];
        let mutedUsers = JSON.parse(localStorage.getItem('yb_muted_ultimate')) || [];
        let rooms = JSON.parse(localStorage.getItem('yb_rooms_ultimate')) || [
            { id: 'general', name: 'General', password: '', createdBy: 'system' },
            { id: 'random', name: 'Random', password: '', createdBy: 'system' }
        ];
        let roomPasswords = JSON.parse(localStorage.getItem('yb_room_passwords')) || {};

        // ============================================
        // LOGIN CON PERSISTENCIA
        // ============================================
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username) {
                alert('❌ Debes poner un nombre');
                return;
            }
            
            // Verificar si está baneado
            if (bannedUsers.includes(username)) {
                alert('🚫 ESTÁS BANEADO - No puedes entrar');
                return;
            }
            
            // Verificar si el nombre ya está en uso (y el usuario no es el mismo)
            const existingUser = users.find(u => u.name === username && u.online);
            if (existingUser) {
                alert('❌ Este nombre ya está en uso por alguien conectado');
                return;
            }
            
            // Verificar clave
            let isOwner = false;
            if (password === OWNER_PASSWORD) {
                isOwner = true;
            } else if (password !== USER_PASSWORD) {
                alert('❌ Clave incorrecta');
                return;
            }
            
            // Crear usuario con ID único
            currentUser = {
                name: username,
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                isOwner: isOwner,
                muted: mutedUsers.includes(username),
                currentRoom: 'general',
                lastSeen: Date.now(),
                online: true
            };
            
            // Eliminar usuario anterior si existe (por si acaso)
            users = users.filter(u => u.name !== username);
            
            // Guardar en lista de usuarios
            users.push({
                name: currentUser.name,
                id: currentUser.id,
                isOwner: currentUser.isOwner,
                muted: currentUser.muted,
                online: true,
                lastSeen: Date.now(),
                currentRoom: 'general'
            });
            
            localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            
            // Guardar sesión
            localStorage.setItem('yb_current_session', JSON.stringify({
                name: currentUser.name,
                id: currentUser.id,
                isOwner: currentUser.isOwner
            }));
            
            // Mostrar chat
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('visible');
            
            // Actualizar UI
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
            
            if (currentUser.isOwner) {
                document.getElementById('profileOwnerBadge').style.display = 'inline';
            }
            
            if (currentUser.muted) {
                disableInputs(true);
            }
            
            // Cargar datos
            loadRooms();
            loadMessages('general');
            updateUsersList();
            
            // ANUNCIAR LLEGADA
            addSystemMessage(`👋 ${currentUser.name} se ha unido al chat`);
            
            // Iniciar loops de tiempo real
            startRealTimeUpdates();
        }

        // ============================================
        // TIEMPO REAL - CORAZÓN DEL SISTEMA
        // ============================================
        function startRealTimeUpdates() {
            // Actualizar cada 1 segundo
            setInterval(() => {
                updateUserOnlineStatus();
                checkForNewMessages();
                checkForUserChanges();
            }, 1000);
            
            // Actualizar typing cada 2 segundos
            setInterval(() => {
                updateTypingStatus();
            }, 2000);
        }

        function updateUserOnlineStatus() {
            const now = Date.now();
            
            // Actualizar lastSeen del usuario actual
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].lastSeen = now;
                users[userIndex].online = true;
            }
            
            // Marcar offline si no se han actualizado en 5 segundos
            users.forEach(u => {
                if (now - u.lastSeen > 5000) {
                    u.online = false;
                } else {
                    u.online = true;
                }
            });
            
            localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            updateUsersList();
        }

        function checkForNewMessages() {
            const currentMessages = JSON.parse(localStorage.getItem('yb_messages_ultimate')) || [];
            
            // Filtrar mensajes de la sala actual
            const roomMessages = currentMessages.filter(m => m.room === currentUser.currentRoom);
            const lastMessage = roomMessages[roomMessages.length - 1];
            
            // Si hay mensajes nuevos en esta sala
            if (roomMessages.length > 0) {
                const lastDisplayed = document.querySelector('.message-wrapper:last-child');
                if (!lastDisplayed || lastDisplayed.dataset.id !== lastMessage.id) {
                    loadMessages(currentUser.currentRoom);
                }
            }
        }

        function checkForUserChanges() {
            const currentUsers = JSON.parse(localStorage.getItem('yb_users_ultimate')) || [];
            
            // Verificar si el usuario actual fue muteado o baneado
            const currentUserData = currentUsers.find(u => u.id === currentUser.id);
            
            if (!currentUserData) {
                // Fue eliminado (baneado probablemente)
                alert('🚫 Has sido eliminado del chat');
                logout();
                return;
            }
            
            // Verificar mute
            if (currentUserData.muted !== currentUser.muted) {
                currentUser.muted = currentUserData.muted;
                if (currentUser.muted) {
                    disableInputs(true);
                } else {
                    disableInputs(false);
                }
            }
        }

        // ============================================
        // SALAS PRIVADAS
        // ============================================
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').classList.add('visible');
        }

        function closeCreateRoomModal() {
            document.getElementById('createRoomModal').classList.remove('visible');
            document.getElementById('newRoomName').value = '';
            document.getElementById('newRoomPassword').value = '';
        }

        function createRoom() {
            const roomName = document.getElementById('newRoomName').value.trim();
            const roomPassword = document.getElementById('newRoomPassword').value.trim();
            
            if (!roomName) {
                alert('❌ El nombre de la sala es obligatorio');
                return;
            }
            
            const roomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            
            const newRoom = {
                id: roomId,
                name: roomName,
                password: roomPassword,
                createdBy: currentUser.name,
                createdByid: currentUser.id,
                createdAt: Date.now()
            };
            
            rooms.push(newRoom);
            localStorage.setItem('yb_rooms_ultimate', JSON.stringify(rooms));
            
            if (roomPassword) {
                roomPasswords[roomId] = roomPassword;
                localStorage.setItem('yb_room_passwords', JSON.stringify(roomPasswords));
            }
            
            loadRooms();
            closeCreateRoomModal();
            
            // Unirse automáticamente a la nueva sala
            joinRoom(roomId, roomPassword);
        }

        function joinRoom(roomId, password = '') {
            const room = rooms.find(r => r.id === roomId);
            
            if (!room) return;
            
            // Verificar contraseña si tiene
            if (room.password && room.password !== password) {
                const userPassword = prompt('🔐 Esta sala está protegida. Ingresa la contraseña:');
                if (userPassword !== room.password) {
                    alert('❌ Contraseña incorrecta');
                    return;
                }
            }
            
            // Salir de la sala anterior
            leaveRoom();
            
            // Unirse a la nueva sala
            currentUser.currentRoom = roomId;
            
            // Actualizar usuario en DB
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].currentRoom = roomId;
                localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            }
            
            // Actualizar UI
            document.getElementById('roomName').textContent = room.name;
            document.getElementById('roomDescription').textContent = `Sala creada por ${room.createdBy}`;
            document.getElementById('roomIcon').textContent = room.name.charAt(0).toUpperCase();
            document.getElementById('leaveRoomBtn').style.display = 'inline-block';
            
            // Cargar mensajes de la sala
            loadMessages(roomId);
            
            // Sistema de mensaje
            addSystemMessage(`📌 Te has unido a la sala: ${room.name}`);
        }

        function leaveRoom() {
            if (currentUser.currentRoom === 'general') return;
            
            currentUser.currentRoom = 'general';
            
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].currentRoom = 'general';
                localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            }
            
            document.getElementById('roomName').textContent = 'General';
            document.getElementById('roomDescription').textContent = 'Sala principal de chat';
            document.getElementById('roomIcon').textContent = '#';
            document.getElementById('leaveRoomBtn').style.display = 'none';
            
            loadMessages('general');
            
            addSystemMessage('📌 Has vuelto a la sala general');
        }

        function loadRooms() {
            const roomsList = document.getElementById('roomsList');
            
            roomsList.innerHTML = rooms.map(room => {
                const isActive = currentUser.currentRoom === room.id;
                const userCount = users.filter(u => u.currentRoom === room.id && u.online).length;
                
                return `
                    <div class="room-item ${isActive ? 'active' : ''}" onclick="joinRoom('${room.id}')">
                        <div class="room-icon">${room.name.charAt(0).toUpperCase()}</div>
                        <div class="room-info">
                            <div class="room-name">${room.name}</div>
                            <div class="room-meta">
                                <span>👤 ${userCount}</span>
                                ${room.password ? '<span class="room-badge">🔒</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // MENSAJES
        // ============================================
        function sendMessage() {
            if (currentUser.muted) {
                alert('🔇 Estás muteado');
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const message = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                user: currentUser.name,
                userId: currentUser.id,
                room: currentUser.currentRoom,
                text: text,
                type: 'text',
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now()
            };
            
            messages.push(message);
            localStorage.setItem('yb_messages_ultimate', JSON.stringify(messages));
            
            displayMessage(message);
            input.value = '';
            
            // Reset typing
            stopTyping();
        }

        function sendImage(input) {
            if (currentUser.muted) return;
            
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                    user: currentUser.name,
                    userId: currentUser.id,
                    room: currentUser.currentRoom,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                localStorage.setItem('yb_messages_ultimate', JSON.stringify(messages));
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
        }

        function sendVideo(input) {
            if (currentUser.muted) return;
            
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const message = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                    user: currentUser.name,
                    userId: currentUser.id,
                    room: currentUser.currentRoom,
                    type: 'video',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                };
                
                messages.push(message);
                localStorage.setItem('yb_messages_ultimate', JSON.stringify(messages));
                displayMessage(message);
            };
            
            reader.readAsDataURL(file);
        }

        function deleteMessage(messageId) {
            const message = messages.find(m => m.id === messageId);
            
            if (message && (message.userId === currentUser.id || currentUser.isOwner)) {
                messages = messages.filter(m => m.id !== messageId);
                localStorage.setItem('yb_messages_ultimate', JSON.stringify(messages));
                loadMessages(currentUser.currentRoom);
            }
        }

        function displayMessage(message) {
            if (message.room !== currentUser.currentRoom) return;
            
            const container = document.getElementById('messagesContainer');
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${message.userId === currentUser.id ? 'own' : ''}`;
            wrapper.dataset.id = message.id;
            
            let content = '';
            if (message.type === 'text') {
                content = `<div class="message-content">${message.text}</div>`;
            } else if (message.type === 'image') {
                content = `<img src="${message.content}" class="message-media" onclick="showImage('${message.content}')">`;
            } else if (message.type === 'video') {
                content = `<video src="${message.content}" controls class="message-media"></video>`;
            } else if (message.type === 'system') {
                wrapper.classList.add('system-message');
                content = `<div style="color: ${message.color || 'cyan'}; text-align: center;">${message.text}</div>`;
            }
            
            wrapper.innerHTML = `
                <div class="message-bubble">
                    <div class="message-header">
                        <span class="message-sender">
                            ${message.user === currentUser.name ? 'Tú' : message.user}
                            ${message.userId ? '' : ' <span style="color:cyan;">✨</span>'}
                        </span>
                        <span class="message-time">${message.time || ''}</span>
                    </div>
                    ${content}
                    ${(message.userId === currentUser.id || currentUser.isOwner) && message.type !== 'system' ? 
                        `<button class="delete-message" onclick="deleteMessage('${message.id}')">✕</button>` : ''}
                </div>
            `;
            
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function loadMessages(roomId) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            messages
                .filter(m => m.room === roomId)
                .slice(-100)
                .forEach(msg => displayMessage(msg));
        }

        function addSystemMessage(text, color = 'cyan') {
            const message = {
                id: 'sys_' + Date.now(),
                type: 'system',
                text: text,
                room: currentUser.currentRoom,
                time: new Date().toLocaleTimeString(),
                color: color
            };
            
            displayMessage(message);
        }

        // ============================================
        // USUARIOS EN TIEMPO REAL
        // ============================================
        function updateUsersList() {
            const grid = document.getElementById('usersGrid');
            
            grid.innerHTML = users
                .filter(u => u.online)
                .map(user => {
                    const isMuted = mutedUsers.includes(user.name);
                    const isCurrentUser = user.id === currentUser.id;
                    const userRoom = rooms.find(r => r.id === user.currentRoom)?.name || 'General';
                    
                    return `
                        <div class="user-card online">
                            <div class="user-avatar-small">${user.name.charAt(0).toUpperCase()}</div>
                            <div class="user-details">
                                <div class="user-name-display">
                                    <span>${user.name} ${user.isOwner ? '👑' : ''}</span>
                                    ${isMuted ? '<span style="color:orange;">🔇</span>' : ''}
                                </div>
                                <div class="user-status-text">
                                    <span>🟢</span> ${userRoom}
                                </div>
                            </div>
                            ${currentUser.isOwner && !isCurrentUser && !user.isOwner ? `
                                <div class="user-actions-small">
                                    <button class="user-action-btn ban" onclick="banUser('${user.id}')">BAN</button>
                                    <button class="user-action-btn mute" onclick="muteUser('${user.id}')">MUTE</button>
                                    <button class="user-action-btn rename" onclick="showRenameModal('${user.id}')">REN</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            
            document.getElementById('onlineCount').textContent = users.filter(u => u.online).length;
        }

        // ============================================
        // PODERES DEL OWNER
        // ============================================
        function banUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (!user || user.isOwner) return;
            
            // Añadir a baneados
            if (!bannedUsers.includes(user.name)) {
                bannedUsers.push(user.name);
                localStorage.setItem('yb_banned_ultimate', JSON.stringify(bannedUsers));
            }
            
            // Eliminar de usuarios
            users = users.filter(u => u.id !== userId);
            localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            
            // Eliminar sus mensajes
            messages = messages.filter(m => m.userId !== userId);
            localStorage.setItem('yb_messages_ultimate', JSON.stringify(messages));
            
            updateUsersList();
            loadMessages(currentUser.currentRoom);
            
            alert(`✅ ${user.name} ha sido baneado`);
        }

        function muteUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (!user || user.isOwner) return;
            
            if (!mutedUsers.includes(user.name)) {
                mutedUsers.push(user.name);
                localStorage.setItem('yb_muted_ultimate', JSON.stringify(mutedUsers));
            }
            
            user.muted = true;
            localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            
            updateUsersList();
        }

        function unmuteUser(userId) {
            if (!currentUser.isOwner) return;
            
            const user = users.find(u => u.id === userId);
            if (user) {
                mutedUsers = mutedUsers.filter(u => u !== user.name);
                localStorage.setItem('yb_muted_ultimate', JSON.stringify(mutedUsers));
                user.muted = false;
                localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
                updateUsersList();
            }
        }

        // ============================================
        // RENOMBRAR USUARIOS
        // ============================================
        let renameTargetId = null;

        function showRenameModal(userId) {
            renameTargetId = userId;
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('renameTitle').textContent = `Cambiar nombre de ${user.name}`;
                document.getElementById('renameModal').classList.add('visible');
            }
        }

        function closeRenameModal() {
            document.getElementById('renameModal').classList.remove('visible');
            document.getElementById('newNameInput').value = '';
            renameTargetId = null;
        }

        function saveRename() {
            if (!renameTargetId) return;
            
            const newName = document.getElementById('newNameInput').value.trim();
            if (!newName) return;
            
            const user = users.find(u => u.id === renameTargetId);
            if (!user) return;
            
            const oldName = user.name;
            
            // Verificar si el nuevo nombre ya existe
            if (users.find(u => u.name === newName && u.id !== renameTargetId)) {
                alert('❌ Ese nombre ya está en uso');
                return;
            }
            
            // Actualizar usuario
            user.name = newName;
            
            // Actualizar en mensajes
            messages.forEach(msg => {
                if (msg.userId === renameTargetId) {
                    msg.user = newName;
                }
            });
            
            localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            localStorage.setItem('yb_messages_ultimate', JSON.stringify(messages));
            
            // Si es el usuario actual, actualizar
            if (currentUser.id === renameTargetId) {
                currentUser.name = newName;
                document.getElementById('profileName').textContent = newName;
                document.getElementById('profileAvatar').textContent = newName.charAt(0).toUpperCase();
                
                // Actualizar sesión
                localStorage.setItem('yb_current_session', JSON.stringify({
                    name: currentUser.name,
                    id: currentUser.id,
                    isOwner: currentUser.isOwner
                }));
            }
            
            updateUsersList();
            loadMessages(currentUser.currentRoom);
            
            closeRenameModal();
            
            addSystemMessage(`✏️ ${oldName} ahora se llama ${newName}`, 'magenta');
        }

        // ============================================
        // TYPING INDICATOR
        // ============================================
        let typingTimeout;

        function onUserTyping() {
            if (!currentUser.typing) {
                currentUser.typing = true;
                updateTypingStatus();
            }
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                stopTyping();
            }, 2000);
        }

        function stopTyping() {
            currentUser.typing = false;
            updateTypingStatus();
        }

        function updateTypingStatus() {
            // Encontrar usuarios escribiendo en la misma sala
            const typingUsers = users.filter(u => 
                u.online && 
                u.typing && 
                u.currentRoom === currentUser.currentRoom &&
                u.id !== currentUser.id
            );
            
            const indicator = document.getElementById('typingIndicator');
            
            if (typingUsers.length === 0) {
                indicator.style.display = 'none';
            } else if (typingUsers.length === 1) {
                indicator.style.display = 'block';
                indicator.textContent = `${typingUsers[0].name} está escribiendo...`;
            } else if (typingUsers.length === 2) {
                indicator.style.display = 'block';
                indicator.textContent = `${typingUsers[0].name} y ${typingUsers[1].name} están escribiendo...`;
            } else {
                indicator.style.display = 'block';
                indicator.textContent = `Varias personas están escribiendo...`;
            }
            
            // Guardar estado de typing
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].typing = currentUser.typing;
                localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            }
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function disableInputs(disabled) {
            document.getElementById('messageInput').disabled = disabled;
            document.getElementById('sendBtn').disabled = disabled;
            document.getElementById('imageBtn').disabled = disabled;
            document.getElementById('videoBtn').disabled = disabled;
        }

        function showImage(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('visible');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('visible');
        }

        function logout() {
            // Eliminar usuario actual
            users = users.filter(u => u.id !== currentUser.id);
            localStorage.setItem('yb_users_ultimate', JSON.stringify(users));
            
            // Limpiar sesión
            localStorage.removeItem('yb_current_session');
            
            // Mostrar login
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.remove('visible');
            
            // Limpiar inputs
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // ============================================
        // COMPROBAR SESIÓN GUARDADA
        // ============================================
        function checkSavedSession() {
            const savedSession = localStorage.getItem('yb_current_session');
            if (savedSession) {
                const session = JSON.parse(savedSession);
                
                // Verificar que el usuario no está baneado
                if (bannedUsers.includes(session.name)) {
                    localStorage.removeItem('yb_current_session');
                    return;
                }
                
                // Verificar que el nombre no está en uso
                if (users.find(u => u.name === session.name && u.online)) {
                    localStorage.removeItem('yb_current_session');
                    return;
                }
                
                // Auto-login
                document.getElementById('username').value = session.name;
                
                // Completar login automático
                setTimeout(() => {
                    login();
                }, 100);
            }
        }

        // Iniciar
        checkSavedSession();
    </script>
</body>
</html>
